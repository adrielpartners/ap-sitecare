name: Publish AP SiteCare Version One

on:
  push:
    branches: [main]
    paths: [.github/workflows/publish-version-one.yml]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified release patch
        shell: bash
        run: |
          cat .github/publish-version-one/part-* > /tmp/release.patch.gz.b64
          base64 --decode /tmp/release.patch.gz.b64 | gzip --decompress > /tmp/release.patch
          git apply --check /tmp/release.patch
          git apply /tmp/release.patch
          rm -rf .github/publish-version-one
          rm .github/workflows/publish-version-one.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git add -A
          test "$(git write-tree)" = "a40dafe93e1a9371d481046e6ea22d5240c20f22"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: complete AP SiteCare version one"
          git push origin HEAD:main
