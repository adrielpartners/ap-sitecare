services:
  dashboard:
    build:
      context: .
    environment:
      NUXT_AUTH_DEVELOPMENT_BYPASS: "false"
      NUXT_CREDENTIAL_ENCRYPTION_KEY: ${NUXT_CREDENTIAL_ENCRYPTION_KEY:-}
      NUXT_DATABASE_PATH: /data/sitecare.sqlite
      NUXT_INTEGRATIONS_DROPBOX_ACCESS_TOKEN: ${NUXT_INTEGRATIONS_DROPBOX_ACCESS_TOKEN:-}
      NUXT_INTEGRATIONS_DROPBOX_BACKUP_ROOT: ${NUXT_INTEGRATIONS_DROPBOX_BACKUP_ROOT:-}
      NUXT_BACKUPS_ALLOWED_LOCAL_BASE_DIRECTORIES: ${NUXT_BACKUPS_ALLOWED_LOCAL_BASE_DIRECTORIES:-/backup-sources}
      NUXT_BACKUPS_DROPBOX_ACCOUNT_LABEL: ${NUXT_BACKUPS_DROPBOX_ACCOUNT_LABEL:-}
      NUXT_BACKUPS_DROPBOX_ENABLED: ${NUXT_BACKUPS_DROPBOX_ENABLED:-true}
      NUXT_BACKUPS_DROPBOX_TOKEN_STRATEGY: ${NUXT_BACKUPS_DROPBOX_TOKEN_STRATEGY:-runtime-access-token}
      NUXT_BACKUPS_TEMP_ROOT: /tmp/ap-sitecare-backups
      NUXT_BACKUPS_STALE_AFTER_MINUTES: ${NUXT_BACKUPS_STALE_AFTER_MINUTES:-60}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(response=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - sitecare-data:/data
      - ${AP_SITECARE_BACKUP_HOST_ROOT:-./backup-sources}:/backup-sources:ro

  backup-worker:
    build:
      context: .
      target: worker
    environment:
      NUXT_CREDENTIAL_ENCRYPTION_KEY: ${NUXT_CREDENTIAL_ENCRYPTION_KEY:-}
      NUXT_DATABASE_PATH: /data/sitecare.sqlite
      NUXT_INTEGRATIONS_DROPBOX_ACCESS_TOKEN: ${NUXT_INTEGRATIONS_DROPBOX_ACCESS_TOKEN:-}
      NUXT_INTEGRATIONS_DROPBOX_BACKUP_ROOT: ${NUXT_INTEGRATIONS_DROPBOX_BACKUP_ROOT:-}
      NUXT_BACKUPS_ALLOWED_LOCAL_BASE_DIRECTORIES: ${NUXT_BACKUPS_ALLOWED_LOCAL_BASE_DIRECTORIES:-/backup-sources}
      NUXT_BACKUPS_DROPBOX_ACCOUNT_LABEL: ${NUXT_BACKUPS_DROPBOX_ACCOUNT_LABEL:-}
      NUXT_BACKUPS_DROPBOX_ENABLED: ${NUXT_BACKUPS_DROPBOX_ENABLED:-true}
      NUXT_BACKUPS_DROPBOX_TOKEN_STRATEGY: ${NUXT_BACKUPS_DROPBOX_TOKEN_STRATEGY:-runtime-access-token}
      NUXT_BACKUPS_TEMP_ROOT: /tmp/ap-sitecare-backups
      NUXT_BACKUPS_STALE_AFTER_MINUTES: ${NUXT_BACKUPS_STALE_AFTER_MINUTES:-60}
    restart: unless-stopped
    volumes:
      - sitecare-data:/data
      - ${AP_SITECARE_BACKUP_HOST_ROOT:-./backup-sources}:/backup-sources:ro

volumes:
  sitecare-data:
