services:
  dashboard:
    build:
      context: .
    environment:
      NUXT_AUTH_DEVELOPMENT_BYPASS: "false"
      NUXT_CREDENTIAL_ENCRYPTION_KEY: ${NUXT_CREDENTIAL_ENCRYPTION_KEY:-}
      NUXT_DATABASE_PATH: /data/sitecare.sqlite
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(response=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - sitecare-data:/data

volumes:
  sitecare-data:
